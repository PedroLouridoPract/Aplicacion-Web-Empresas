# PostgreSQL para el backend (Prisma)
# Uso: desde la carpeta backend ejecutar: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: app-empresas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_empresas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
